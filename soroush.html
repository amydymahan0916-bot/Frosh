<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سروش | خدمات مجازی ماهان امیدی</title>

<link rel="stylesheet" href="style.css">

<style>
body{
background:#050505;
color:#fff;
font-family:tahoma;
}

.box{
max-width:900px;
margin:auto;
text-align:center;
padding:30px 15px;
}

h1{
color:#00ff88;
margin-bottom:10px;
}

.desc{
color:#ccc;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-top:35px;
}

.item{
background:#111;
border:1px solid #00ff88;
border-radius:20px;
padding:20px;
transition:.3s;
}

.item:hover{
transform:translateY(-8px);
box-shadow:0 0 25px #00ff8840;
}

.item h2{
color:#00ff88;
}

.item p{
color:#ddd;
}

.btn{
display:inline-block;
margin-top:12px;
background:#00ff88;
color:#000;
padding:10px 25px;
border-radius:20px;
text-decoration:none;
font-weight:bold;
}

.back{
display:block;
margin-top:30px;
color:#00ff88;
text-decoration:none;
}

@media(max-width:600px){
.grid{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<div class="box">

<h1>خدمات سروش</h1>

<p class="desc">
خدمات افزایش بازدید، ممبر و تبلیغات در پیام‌رسان سروش
</p>

<div class="grid">

<div class="item">
<h2>ممبر سروش</h2>
<p>افزایش اعضای کانال و گروه</p>
<a class="btn" href="payment.html">سفارش</a>
</div>

<div class="item">
<h2>بازدید سروش</h2>
<p>افزایش بازدید پست‌ها</p>
<a class="btn" href="payment.html">سفارش</a>
</div>

<div class="item">
<h2>لایک سروش</h2>
<p>افزایش تعامل محتوا</p>
<a class="btn" href="payment.html">سفارش</a>
</div>

<div class="item">
<h2>تبلیغات سروش</h2>
<p>معرفی کانال و کسب‌وکار</p>
<a class="btn" href="payment.html">سفارش</a>
</div>

</div>

<a class="back" href="index.html">بازگشت به صفحه اصلی</a>

</div>

</body>
</html>
