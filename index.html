<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدمات مجازی ماهان امیدی</title>
<link rel="stylesheet" href="style.css">

<style>

/* ===== اسپلش ===== */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0f0f0f;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 1.5s ease;
}

/* لوگو */
#logo {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: url("profile.jpg") center/cover no-repeat;
  box-shadow: 0 0 20px #00ffcc;
  animation: pulse 1.5s infinite;
  margin-bottom: 20px;
}

@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 0 10px #00ffcc; }
  50% { transform: scale(1.1); box-shadow: 0 0 25px #00ffcc; }
  100% { transform: scale(1); box-shadow: 0 0 10px #00ffcc; }
}

/* متن تایپ */
#text {
  font-size: 18px;
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  margin-top: 10px;
}

</style>

</head>

<body>

<!-- ===== صفحه ورود ===== -->
<div id="splash">

  <div id="logo"></div>
  <div id="text"></div>

</div>

<!-- ===== سایت اصلی ===== -->
<div id="content" style="display:none;">

<div class="header">

<div class="profile">
<img src="profile.jpg" alt="ماهان امیدی">
</div>

<h1>خدمات مجازی ماهان امیدی</h1>

<p>
خرید خدمات شبکه‌های اجتماعی با پشتیبانی سریع
</p>

</div>

<div class="services">

<a href="rubika.html" class="card">
<img src="rubika.png" class="icon">
<h3>خدمات روبیکا</h3>
</a>

<a href="telegram.html" class="card">
<img src="telegram.png" class="icon">
<h3>خدمات تلگرام</h3>
</a>

<a href="instagram.html" class="card">
<img src="instagram.png" class="icon">
<h3>خدمات اینستاگرام</h3>
</a>

<a href="eita.html" class="card">
<img src="eita.png" class="icon">
<h3>خدمات ایتا</h3>
</a>

<a href="soroush.html" class="card">
<img src="soroush.png" class="icon">
<h3>خدمات سروش+</h3>
</a>

<a href="whatsapp.html" class="card">
<img src="whatsapp.png" class="icon">
<h3>خدمات واتساپ</h3>
</a>

<a href="youtube.html" class="card">
<img src="youtube.png" class="icon">
<h3>خدمات یوتیوب</h3>
</a>

<a href="contact.html" class="card">
<img src="contact.png" class="icon">
<h3>تماس با ما</h3>
</a>

</div>

</div>

<script>

const message = "به پنل خدمات مجازی ماهان امیدی خوش آمدید";
let i = 0;

function typeText() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeText, 60);
  }
}

typeText();

window.onload = function () {

  setTimeout(() => {

    document.getElementById("splash").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("content").style.display = "block";
    }, 1500);

  }, 4000);

};

</script>

</body>
</html>
