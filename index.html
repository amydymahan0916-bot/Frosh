<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدمات مجازی ماهان امیدی</title>

<style>

/* ===== کل صفحه ===== */
body {
  margin: 0;
  font-family: monospace;
  overflow: hidden;
  background: black;
}

/* ===== بک‌گراند Matrix ===== */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* ===== صفحه خوش‌آمد ===== */
#splash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;

  background: rgba(0,0,0,0.85);
  color: #00ff00;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  z-index: 9999;

  transition: opacity 1.5s ease;
  text-shadow: 0 0 10px #00ff00;
}

/* متن تایپ */
#text {
  font-size: 22px;
  border-right: 2px solid #00ff00;
  white-space: nowrap;
  overflow: hidden;
}

/* ===== سایت اصلی ===== */
#content {
  display: none;
  position: relative;
  z-index: 5;
  background: white;
  color: black;
  padding: 20px;
  font-family: sans-serif;
}

</style>

</head>

<body>

<!-- ===== Matrix Background ===== -->
<canvas id="matrix"></canvas>

<!-- ===== Splash Screen ===== -->
<div id="splash">
  <div id="text"></div>
</div>

<!-- ===== Main Site ===== -->
<div id="content">

<div class="header">

<div class="profile">
<img src="profile.jpg" alt="ماهان امیدی">
</div>

<h1>خدمات مجازی ماهان امیدی</h1>

<p>خرید خدمات شبکه‌های اجتماعی با پشتیبانی سریع</p>

</div>

<div class="services">

<a href="rubika.html">روبیکا</a> |
<a href="telegram.html">تلگرام</a> |
<a href="instagram.html">اینستاگرام</a> |
<a href="eita.html">ایتا</a> |
<a href="whatsapp.html">واتساپ</a> |
<a href="contact.html">تماس با ما</a>

</div>

</div>

<script>

/* ===== تایپ هکری ===== */
const message = "ACCESSING SYSTEM... WELCOME MAHAN OMIDI PANEL...";
let i = 0;

function typeText() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeText, 60);
  }
}
typeText();

/* ===== Matrix Effect ===== */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&@";
letters = letters.split("");

const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for (let x = 0; x < columns; x++)
  drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff00";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);

/* ===== ورود به سایت ===== */
window.onload = function () {

  setTimeout(() => {

    document.getElementById("splash").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("content").style.display = "block";
    }, 1500);

  }, 3500);

};

</script>

</body>
</html>
