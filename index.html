<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدمات مجازی ماهان امیدی</title>

<link rel="stylesheet" href="style.css">

<style>

/* ===== صفحه خوش‌آمد ===== */
#splash{
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 999999;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  background: rgba(0,0,0,0.95);
  color: #00ff00;

  font-family: monospace;
  text-shadow: 0 0 10px #00ff00;

  transition: opacity 1.2s ease;
}

/* لوگو */
#logo{
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: url("profile.jpg") center/cover no-repeat;
  box-shadow: 0 0 20px #00ff00;
  animation: pulse 1.5s infinite;
  margin-bottom: 15px;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* متن تایپ */
#text{
  font-size: 18px;
  border-right: 2px solid #00ff00;
  white-space: nowrap;
  overflow: hidden;
}

/* سایت اصلی */
#content{
  display: none;
}

</style>

</head>

<body>

<!-- ===== Splash Screen ===== -->
<div id="splash">
  <div id="logo"></div>
  <div id="text"></div>
</div>

<!-- ===== Main Site ===== -->
<div id="content">

<div class="header">

<div class="profile">
<img src="profile.jpg" alt="ماهان امیدی">
</div>

<h1>خدمات مجازی ماهان امیدی</h1>

<p>خرید خدمات شبکه‌های اجتماعی با پشتیبانی سریع</p>

</div>

<div class="services">

<a href="rubika.html" class="card">
<img src="rubika.png" class="icon">
<h3>خدمات روبیکا</h3>
</a>

<a href="telegram.html" class="card">
<img src="telegram.png" class="icon">
<h3>خدمات تلگرام</h3>
</a>

<a href="instagram.html" class="card">
<img src="instagram.png" class="icon">
<h3>خدمات اینستاگرام</h3>
</a>

<a href="eita.html" class="card">
<img src="eita.png" class="icon">
<h3>خدمات ایتا</h3>
</a>

<a href="whatsapp.html" class="card">
<img src="whatsapp.png" class="icon">
<h3>خدمات واتساپ</h3>
</a>

<a href="contact.html" class="card">
<h3>تماس با ما</h3>
</a>

</div>

</div>

<script>

/* ===== متن تایپی ===== */
const message = "به پنل خدمات مجازی ماهان امیدی خوش آمدید";
let i = 0;

function typeText(){
  if(i < message.length){
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeText, 60);
  }
}
typeText();

/* ===== ورود ===== */
window.onload = function(){

  setTimeout(() => {

    document.getElementById("splash").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("splash").remove();
      document.getElementById("content").style.display = "block";
    }, 1200);

  }, 3500);

};

</script>

</body>
  </html>
