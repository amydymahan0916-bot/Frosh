<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدمات مجازی ماهان امیدی</title>

<style>

/* 🔥 مهم‌ترین بخش (رفع مشکل صفحه کامل) */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: monospace;
}

/* Matrix */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* فلش */
#flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  z-index: 9998;
}

/* صفحه خوش‌آمد */
#splash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  background: rgba(0,0,0,0.95);
  color: #00ff00;

  z-index: 9999;

  text-shadow: 0 0 10px #00ff00;
  transition: opacity 1.5s ease;
}

/* متن */
#text {
  font-size: 20px;
  border-right: 2px solid #00ff00;
  white-space: nowrap;
  overflow: hidden;
}

/* سایت اصلی */
#content {
  display: none;
  position: relative;
  z-index: 5;
  background: white;
  color: black;
  padding: 20px;
}

</style>

</head>

<body>

<div id="flash"></div>

<canvas id="matrix"></canvas>

<div id="splash">
  <div id="text"></div>
</div>

<audio id="hackSound">
  <source src="https://www.soundjay.com/misc/sounds/beep-07.mp3">
</audio>

<div id="content">

<h1>خدمات مجازی ماهان امیدی</h1>
<p>سیستم فعال شد</p>

</div>

<script>

/* تایپ */
const message = "ACCESSING SYSTEM... WELCOME MAHAN OMIDI";
let i = 0;

function typeText() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeText, 55);
  }
}
typeText();

/* Matrix */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&@".split("");
const fontSize = 14;
let columns = canvas.width / fontSize;
let drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff00";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);

/* ورود */
window.onload = function () {

  document.getElementById("hackSound").play().catch(()=>{});

  setTimeout(() => {

    document.getElementById("flash").style.opacity = "0.9";

    setTimeout(() => {
      document.getElementById("flash").style.opacity = "0";
    }, 120);

    document.getElementById("splash").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("content").style.display = "block";
    }, 1500);

  }, 3000);

};

</script>

</body>
</html>
