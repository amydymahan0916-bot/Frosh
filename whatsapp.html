<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<link rel="stylesheet" href="style.css">

<style>

.btn{display:inline-block;margin-top:15px;background:#00ff88;color:#000;padding:10px 25px;border-radius:20px;text-decoration:none;font-weight:bold}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>

<body>
<div class="box">
<h1>خدمات واتساپ</h1>

<div class="grid">

<div class="item">
<h2>عضو واتساپ</h2>
<p>افزایش ممبر گروه</p>

</div>

<div class="item">
<h2>تبلیغات واتساپ</h2>
<p>پخش تبلیغ در گروه‌ها</p>

</div>

</div>
</div>
</body>
</html>
