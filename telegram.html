<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>خدمات تلگرام | خدمات مجازی ماهان امیدی</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#050505;
color:white;
}

.telegram-page{
max-width:900px;
margin:auto;
padding:30px 15px;
text-align:center;
}


.telegram-page h1{
color:#00ff88;
font-size:35px;
margin-bottom:15px;
}


.telegram-page .intro{
color:#ccc;
font-size:17px;
}


.services-box{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-top:35px;
}


.service{
background:rgba(255,255,255,.08);
border:1px solid rgba(0,255,136,.4);
border-radius:25px;
padding:25px;
transition:.3s;
}


.service:hover{
transform:translateY(-8px);
box-shadow:0 0 25px #00ff8844;
}


.service h2{
color:#00ff88;
font-size:22px;
}


.service p{
color:#ddd;
}


.buy{
display:inline-block;
margin-top:15px;
padding:12px 30px;
background:#00ff88;
color:#000;
border-radius:25px;
text-decoration:none;
font-weight:bold;
}


.back{
display:block;
margin-top:35px;
color:#00ff88;
text-decoration:none;
}


@media(max-width:600px){

.services-box{
grid-template-columns:1fr;
}

.telegram-page h1{
font-size:28px;
}

}

</style>

</head>

<body>


<div class="telegram-page">


<h1>
خدمات تلگرام
</h1>


<p class="intro">
ارائه خدمات حرفه‌ای تلگرام شامل ممبر، بازدید، لایک و رشد کانال
</p>



<div class="services-box">


<div class="service">

<h2>ممبر تلگرام</h2>

<p>
افزایش اعضای کانال و گروه تلگرام
</p>

<a class="buy" href="payment.html">
خرید
</a>

</div>



<div class="service">

<h2>بازدید تلگرام</h2>

<p>
افزایش بازدید پست‌های کانال
</p>

<a class="buy" href="payment.html">
خرید
</a>

</div>



<div class="service">

<p>
افزایش تعامل و محبوبیت محتوا
</p>

<a class="buy" href="payment.html">

</div>

</div>


</body>
</html>
