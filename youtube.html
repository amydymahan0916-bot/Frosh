<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>خدمات یوتیوب</title>

<link rel="stylesheet" href="style.css">

<style>

.list{
width:95%;
max-width:800px;
margin:auto;
}

.item{
background:white;
padding:18px;
border-radius:15px;
margin-bottom:10px;
cursor:pointer;
box-shadow:0 2px 10px rgba(0,0,0,.08);
font-size:18px;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
}

.box{
background:white;
width:90%;
max-width:500px;
margin:120px auto;
padding:25px;
border-radius:20px;
text-align:center;
}

.buy{
display:block;
background:#ff0000;
color:white;
text-decoration:none;
padding:15px;
border-radius:12px;
margin-top:15px;
}

.close{
margin-top:10px;
padding:10px;
border:none;
background:#ddd;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">💰</div>

<h1>خدمات یوتیوب</h1>

</div>

<div class="list">

<div class="item" onclick="showService('فالوور یوتیوب','5000000')">
فالوور یوتیوب
</div>

<div class="item" onclick="showService('کامنت یوتیوب','3000000')">
کامنت یوتیوب
</div>

<div class="item" onclick="showService('لایک یوتیوب','2000000')">
لایک یوتیوب
</div>

<div class="item" onclick="showService('ویو یوتیوب','800000')">
ویو یوتیوب
</div>

</div>

<div class="popup" id="popup">

<div class="box">

<h2 id="serviceName"></h2>

<h3 id="servicePrice"></h3>

<a id="buyBtn" class="buy">
خرید سرویس
</a>

<button class="close" onclick="closePopup()">
بستن
</button>

</div>

</div>

<script>

function showService(name,price){

document.getElementById("serviceName").innerText=name;

document.getElementById("servicePrice").innerText=
"قیمت: " + Number(price).toLocaleString('fa-IR') + " تومان";

document.getElementById("buyBtn").href =
"payment.html?service=" + encodeURIComponent(name) + "&price=" + price;

document.getElementById("popup").style.display="block";

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

</script>

</body>
  </html>
